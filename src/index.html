<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>8Wall AFrame Template</title>
    <meta itemprop="name" content="8Wall AFrame Template">
    <meta name="twitter:title" content="8Wall AFrame Template">
    <meta property="og:title" content="8Wall AFrame Template">
    <meta property="og:site_name" content="8Wall AFrame Template">
    <meta name="description" content="">
    <meta itemprop="description" content="">
    <meta property="og:description" content="">
    <meta name="twitter:description" content="">
    <script crossorigin="anonymous" src="./external/scripts/8frame-1.3.0.min.js"></script>
    <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
    <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
    <script crossorigin="anonymous" src="./external/xr/xr.js" data-preload-chunks="face, slam" async="true"></script>

    <!-- Eruda Script, activate for debugging in mobile browsers -->
    <!--
        <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
        <script>eruda.init();</script>
    -->

    </script>

    <!-- Copyright (c) 2022 8th Wall, Inc. -->
    <!-- head.html is optional; elements will be added to your html head before app.js is loaded. -->

    <!-- GYUMIN -->

    <!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
    <meta name="8thwall:renderer" content="aframe:1.3.0"/>
    <meta name="8thwall:package" content="@8thwall.xrextras"/>
    <meta name="8thwall:package" content="@8thwall.landing-page"/>

    <!-- Other external scripts and meta tags can also be added. -->
    <script src="./external/scripts/aframe-extras-6.1.1.min.js"></script>

</head>

<body>
<script src="bundle.js"></script>

<a-scene
        id="scene"
        xrextras-gesture-detector
        landing-page
        xrextras-loading
        xrextras-runtime-error
        renderer="colorManagement: false"
        no-frustrum-cull
        xrweb="allowedDevices: any; disableWorldTracking: false"
>


    <!-- We can define assets here to be loaded when A-Frame initializes -->
    <a-assets>
        <a-asset-item id="stick01" src="assets/P26_T04_LS_AESPA.1_LIT.glb"></a-asset-item>
        <a-asset-item id="stick02" src="assets/P26_T04_LS_AESPA.1_LIT.glb"></a-asset-item>
        <a-asset-item id="stick03" src="assets/P26_T04_LS_AESPA.1_LIT.glb"></a-asset-item>
        <a-asset-item id="stick04" src="assets/P26_T04_LS_AESPA.1_LIT.glb"></a-asset-item>
        <a-asset-item id="stick05" src="assets/P26_T04_LS_AESPA.2_LIT.glb"></a-asset-item>
        <a-asset-item id="stick06" src="assets/P26_T04_LS_B.A.P_LIT.glb"></a-asset-item>
        <a-asset-item id="stick07" src="assets/P26_T04_LS_BILLIE_LIT.glb"></a-asset-item>
        <a-asset-item id="stick08" src="assets/P26_T04_LS_BLACKPINK_LIT.glb"></a-asset-item>
        <a-asset-item id="stick09" src="assets/P26_T04_LS_BOA_LIT.glb"></a-asset-item>
        <a-asset-item id="stick10" src="assets/P26_T04_LS_BTS_LIT.glb"></a-asset-item>
        <a-asset-item id="stick11" src="assets/P26_T04_LS_EVNNE_LIT.glb"></a-asset-item>
        <a-asset-item id="stick12" src="assets/P26_T04_LS_EXO_LIT.glb"></a-asset-item>
        <a-asset-item id="stick13" src="assets/P26_T04_LS_GFRIEND_LIT.glb"></a-asset-item>
        <a-asset-item id="stick14" src="assets/P26_T04_LS_GIRLSGENERATION_LIT.glb"></a-asset-item>
        <a-asset-item id="stick15" src="assets/P26_T04_LS_GOT7_LIT.glb"></a-asset-item>
        <a-asset-item id="stick16" src="assets/P26_T04_LS_I-DLE_LIT.glb"></a-asset-item>
        <a-asset-item id="stick17" src="assets/P26_T04_LS_IU_LIT.glb"></a-asset-item>
        <a-asset-item id="stick18" src="assets/P26_T04_LS_KISSOFLIFE_LIT.glb"></a-asset-item>
        <a-asset-item id="stick19" src="assets/P26_T04_LS_LESSERAFIM_LIT.glb"></a-asset-item>
        <a-asset-item id="stick20" src="assets/P26_T04_LS_MAMAMOO_LIT.glb"></a-asset-item>
        <a-asset-item id="stick21" src="assets/P26_T04_LS_NEWJEANS.glb"></a-asset-item>
        <a-asset-item id="stick22" src="assets/P26_T04_LS_NEWJEANS_LIT.glb"></a-asset-item>
        <a-asset-item id="stick23" src="assets/P26_T04_LS_NTX_LIT.glb"></a-asset-item>
        <a-asset-item id="stick24" src="assets/P26_T04_LS_POW_LIT.glb"></a-asset-item>
        <a-asset-item id="stick25" src="assets/P26_T04_LS_SEVENTEEN_LIT.glb"></a-asset-item>
    </a-assets>

        <a-camera
                id="camera"
                raycaster="objects: .cantap"
                cursor="fuse: false; rayOrigin: mouse;"
                position="0 8 8">
        </a-camera>

        <a-entity
                light="
                    type: directional;
                    intensity: 2;
                    castShadow: true;
                    shadowMapHeight:2048;
                    shadowMapWidth:2048;
                    shadowCameraTop: 80;
                    shadowCameraBottom: -80;
                    shadowCameraRight: 80;
                    shadowCameraLeft: -80;
                    target: #group;
                    shadowRadius: 12"
                xrextras-attach="target: group; offset: 1 50 15;"
                shadow>
        </a-entity>

        <a-light type="ambient" intensity="0.7"></a-light>

        <a-entity
                gltf-model="#stick01"
                scale="10 10 10"
                rotation="0 0 0"
                position="0 5 -5"
                animation-mixer="timeScale: 1.1"
                shadow>
        </a-entity>

    <!-- example primitive (plane) as ground -->
        <a-plane
                id="ground"
                rotation="-90 0 0"
                position="-50 0 -50"
                width="500"
                height="500"
                material="shader: shadow"
                shadow
        ></a-plane>




    </a-scene>
</body>

</html>
